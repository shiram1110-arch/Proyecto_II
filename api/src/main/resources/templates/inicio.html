<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/inicio.css">
</head>

<body>

    <header class="header shadow">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center gap-3">
                <img src="/img/logo.png" class="logo-header">
                <a class="navbar-brand m-0" href="#">
                    <span id="nombreUsuario"></span>
                </a>
            </div>

            <!-- 🔥 NAV DINÁMICO -->
            <div id="authButtons">
                <a href="/login" class="btn btn-login-neon">Login</a>
            </div>


        </div>
    </header>

    <!-- 🔥 CARRUSEL -->
    <div id="carouselExample" class="carousel slide">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="/img/crossfit.png" class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="/img/pilates.png" class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="/img/yoga.png" class="d-block w-100">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <!-- 🔥 SECCIÓN -->
    <section class="container mt-5">
        <h2 class="text-center mb-4 titulo">Nuestras Clases</h2>

        <div class="row text-center">

            <div class="col-md-4 mb-3">
                <div class="card card-custom">
                    <div class="card-body">
                        <h5>Smart Rumba</h5>
                        <p>Baila y quema calorías</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card card-custom">
                    <div class="card-body">
                        <h5>Smart Cycling</h5>
                        <p>Entrenamiento intenso</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card card-custom">
                    <div class="card-body">
                        <h5>Smart Zumba</h5>
                        <p>Diversión y energía</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- 🔥 FOOTER -->
    <footer class="footer mt-5 py-4 text-center">
        <div class="container">
            <img src="/img/logo.png" width="120" class="mb-2">
            <p class="mb-1">© 2026 VIKINGS</p>
            <p class="mb-0 small">Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 🔐 AUTH -->
    <script src="/js/auth.js"></script>

    <script>
        const container = document.getElementById("authButtons");

        if (isAuthenticated()) {

            // 👑 ADMIN
            if (isAdmin()) {
                container.innerHTML = `
                <ul class="nav nav-tabs custom-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/horarioClases">Clases</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/adminDashboard">Admin</a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn-logout" onclick="logout()">Salir</button>
                    </li>
                </ul>
                `;
            }

            // 👤 USER
            else if (isUser()) {
                container.innerHTML = `
                <ul class="nav nav-tabs custom-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/historial">Historial</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/horarioClases">Clases</a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn-logout" onclick="logout()">Salir</button>
                    </li>
                </ul>
                `;
            }
        }
    </script>

    <script>getNombre()</script>

</body>

</html>
