<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Clases</title>
    <link rel="stylesheet" href="/css/historial.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><span id="nombreUsuario"></span></a>
            <div class="d-flex">
                <button onclick="logout()" class="btn btn-login-neon">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card p-4">
            <h3 class="mb-4 text-center">Historial de Clases Reservadas</h3>

            <table class="table table-striped table-dark text-center">
                <thead>
                    <tr>
                        <th>Clase</th>
                        <th>Capacidad de personas</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaHistorial">

                </tbody>
            </table>

        </div>

    </div>

    <script src="/js/auth.js"></script>
    <script>requireAuth() </script>

</body>

<script>
    async function cargarHistorial() {
        try {
            const token = localStorage.getItem("token");


            const response = await authFetch("/api/reservas/mis-clases", {
                method: "GET"
            });

            console.log("STATUS:", response.status);

            if (!response.ok) {
                console.error("Error HTTP:", response.status);

                return;
            }

            const data = await response.json();

            console.log("DATA:", data);
            console.log("Cantidad:", data.length);

            const tabla = document.getElementById("tablaHistorial");
            tabla.innerHTML = "";
            let contenido = "";

            data.forEach(reserva => {
                contenido += `
            <tr>
            <td>${reserva.nombreClase}</td>
            <td>${reserva.capacidad}</td>
            <td>${reserva.fechaReserva}</td>
            <td>${reserva.horario}</td>
            <td>${reserva.estado}</td>
        </tr>
        `;
            });
            tabla.innerHTML = contenido;

        } catch (error) {
            console.error("Error:", error);
        }
    }

    document.addEventListener("DOMContentLoaded", cargarHistorial);
</script>

<script>getNombre()</script>

</html>
