<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>


    <div class="header d-flex justify-content-between align-items-center px-4 py-2">
        <h4 class="titulo m-0">Panel Administrador</h4>
        <button class="btn btn-main">Cerrar Sesión</button>
    </div>

    <div class="container mt-5">

        <div class="text-center mb-4">
            <img src="/img/logo.png" class="logo">
            <p class="subtitulo">Gestión del sistema VIKINGS</p>
        </div>

        <div class="row g-4 justify-content-center">


            <div class="col-md-4">
                <div class="registro-card p-4 text-center card-hover" onclick="location.href='/crearClase'">
                    <h5 class="titulo">Crear Clase</h5>
                    <p class="subtitulo">Registrar nuevas clases</p>
                </div>
            </div>


            <div class="col-md-4">
                <div class="registro-card p-4 text-center card-hover" onclick="location.href='/usuariosVista'">
                    <h5 class="titulo">Gestionar Usuarios</h5>
                    <p class="subtitulo">Agregar nuevos admins</p>
                </div>
            </div>


            <div class="col-md-4">
                <div class="registro-card p-4 text-center card-hover" onclick="location.href='/horarioClases'">
                    <h5 class="titulo">Ver Clases</h5>
                    <p class="subtitulo">Consultar horarios</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
