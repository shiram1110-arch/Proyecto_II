<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/formularioVikingNuevo.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 registro-card">

            <div class="text-center mb-3">
                <h3 class="fw-bold titulo">Registro de usuario</h3>
            </div>

            <form method="post" action="/registro_Usuario">

                <input type="text" name="username" class="form-control mb-3" placeholder="Usuario " required>

                <input type="text" name="password" class="form-control mb-3" placeholder="Contraseña" required>

                <button class="btn btn-main w-100">Crear usuario</button>

                <div class="text-center mb-4">
                    <br>
                    <img src="/img/logo.png" alt="logo" class="logo">
                </div>
            </form>

        </div>

    </div>

</body>

</html>
