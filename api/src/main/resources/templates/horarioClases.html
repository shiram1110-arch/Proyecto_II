<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Horario de Clases</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/horarioClases.css">
</head>

<body>

    <div class="container mt-5">

        <header class="header">

            <div class="logo-container">
                <img src="/img/logo.png" alt="Smart Fit" class="logo-header">
            </div>

            <nav class="menu">
                <a href="#">Prueba</a>
            </nav>

            <div class="menu-icon">
                ☰
            </div>

        </header>

        <h2 class="text-center mb-4 titulo">Horario de Clases</h2>

        <div class="text-center mb-2 subtitulo-dia">
            Escoge un día
        </div>

        <div class="dias text-center mb-4">
            <button class="dia activo">LUN</button>
            <button class="dia">MAR</button>
            <button class="dia">MIÉ</button>
            <button class="dia">JUE</button>
            <button class="dia">VIE</button>
            <button class="dia">SÁB</button>
            <button class="dia">DOM</button>
        </div>

        <div class="lista-clases">

            <div class="clase-item">
                <div class="hora">09:15</div>

                <div class="info">
                    <div class="nombre">Smart Rumba</div>
                </div>

                <div class="duracion">45min</div>

                <button class="btn-mas" onclick="window.location.href='/reservas'">Más</button>
            </div>

            <div class="clase-item">
                <div class="hora">09:15</div>
                <div class="info">
                    <div class="nombre">Smart Rumba</div>
                </div>
                <div class="duracion">45min</div>
                <button class="btn-mas">Más</button>
            </div>

            <div class="clase-item">
                <div class="hora">19:15</div>
                <div class="info">
                    <div class="nombre">Smart Cycling</div>
                </div>
                <div class="duracion">45min</div>
                <button class="btn-mas">Más</button>
            </div>

            <div class="clase-item">
                <div class="hora">19:15</div>
                <div class="info">
                    <div class="nombre">Smart Zumba</div>
                </div>
                <div class="duracion">45min</div>
                <button class="btn-mas">Más</button>
            </div>

        </div>

    </div>
</body>

<footer class="footer mt-5 py-4 text-center">
    <div class="container">
        <img src="/img/logo.png" alt="Logo" width="120" class="mb-2">
        <p class="mb-1">© 2026 VIKINGS</p>
        <p class="mb-0 small">Todos los derechos reservados</p>
    </div>
</footer>

</html>
