<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Horario de Clases</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/horarioClases.css">
</head>

<body>

    <div class="container mt-5">

               <nav class="navbar header px-4">
        <div class="d-flex align-items-center">
            <img src="/img/logo.png" class="logo me-2">
            <h4 class="titulo m-0">Horarios de clases</h4>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-danger" onclick="window.location.href='/inicio'">
                Cerrar sesión
            </button>
        </div>
    </nav>

        <div class="text-center mb-2 subtitulo-dia">
            Escoge un día
        </div>

        <div class="dias text-center mb-4">
            <a href="/horarioClases?diaSemana=LUNES" class="dia"
                th:classappend="${diaActual == 'LUNES'} ? 'activo' : ''">
                LUN
            </a>
            <a href="/horarioClases?diaSemana=MARTES" class="dia"
                th:classappend="${diaActual == 'MARTES'} ? 'activo' : ''">
                MAR
            </a>
            <a href="/horarioClases?diaSemana=MIERCOLES" class="dia"
                th:classappend="${diaActual == 'MIERCOLES'} ? 'activo' : ''">
                MIÉ
            </a>
            <a href="/horarioClases?diaSemana=JUEVES" class="dia"
                th:classappend="${diaActual == 'JUEVES'} ? 'activo' : ''">
                JUE
            </a>
            <a href="/horarioClases?diaSemana=VIERNES" class="dia"
                th:classappend="${diaActual == 'VIERNES'} ? 'activo' : ''">
                VIE
            </a>
            <a href="/horarioClases?diaSemana=SABADO" class="dia"
                th:classappend="${diaActual == 'SABADO'} ? 'activo' : ''">
                SÁB
            </a>
            <a href="/horarioClases?diaSemana=DOMINGO" class="dia"
                th:classappend="${diaActual == 'DOMINGO'} ? 'activo' : ''">
                DOM
            </a>
        </div>

        <div class="lista-clases">

            <div class="clase-item" th:each="clase : ${clases}">

                <div class="hora" th:text="${clase.horario}"></div>

                <div class="info">
                    <div class="nombre" th:text="${clase.nombre}"></div>
                </div>

                <a th:href="@{/reservas/{idClase}(idClase=${clase.idClase})}" class="btn-mas">
                    Más
                </a>

            </div>

        </div>

        <div class="text-center mt-4" th:if="${#lists.isEmpty(clases)}">
            <p>No hay clases disponibles para este día</p>
        </div>

    </div>

    <footer class="footer mt-5 py-4 text-center">
        <div class="container">
            <img src="/img/logo.png" alt="Logo" width="120" class="mb-2">
            <p class="mb-1">© 2026 VIKINGS</p>
            <p class="mb-0 small">Todos los derechos reservados</p>
        </div>
    </footer>

</body>

</html>
