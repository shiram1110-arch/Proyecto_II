<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/formularioVikingNuevo.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 registro-card">

            <div class="text-center mb-3">
                <h3 class="fw-bold titulo">Datos personales</h3>
            </div>

            <form method="post" action="/registro">

                <input type="text" name="nombre" class="form-control mb-3" placeholder="Nombre" required>

                <input type="text" name="apellido_uno" class="form-control mb-3" placeholder="Primer apellido" required>

                <input type="text" name="apellido_dos" class="form-control mb-3" placeholder="Segundo apellido"
                    required>

                <input type="tel" name="telefono" class="form-control mb-3" placeholder="Teléfono" required>

                <input type="email" name="email" class="form-control mb-3" placeholder="Correo electrónico" required>

                <button class="btn btn-main w-100">Continuar</button>

                <div class="text-center mb-4">
                    <br>
                    <img src="/img/logo.png" alt="logo" class="logo">
                </div>
            </form>

        </div>

    </div>

</body>

</html>
