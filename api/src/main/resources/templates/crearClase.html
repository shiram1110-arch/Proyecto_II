<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Clase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/crearClase.css">
</head>

<body>

    <div class="d-flex justify-content-center align-items-center vh-100">

        <div class="registro-card p-4">

            <div class="text-center">
                <img src="/img/logo.png" alt="logo" class="logo">
                <h2 class="titulo">Nueva Clase</h2>
                <p class="subtitulo">Crea una clase en el sistema</p>
            </div>

            <form id="formClase">

                <input type="hidden" name="idClase" th:value="${clase?.idClase}">

                <div class="mb-3">
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre de la clase"
                        th:value="${clase?.nombre}" required>
                </div>

                <div class="mb-3">
                    <input type="text" name="descripcion" class="form-control" placeholder="Descripción"
                        th:value="${clase?.descripcion}" required>
                </div>

                <div class="mb-3">
                    <select name="diaSemana" class="form-control" required>
                        <option value="">Día de la semana</option>

                        <option value="Lunes" th:selected="${clase?.diaSemana == 'Lunes'}">Lunes</option>
                        <option value="Martes" th:selected="${clase?.diaSemana == 'Martes'}">Martes</option>
                        <option value="Miércoles" th:selected="${clase?.diaSemana == 'Miércoles'}">Miércoles</option>
                        <option value="Jueves" th:selected="${clase?.diaSemana == 'Jueves'}">Jueves</option>
                        <option value="Viernes" th:selected="${clase?.diaSemana == 'Viernes'}">Viernes</option>
                        <option value="Sábado" th:selected="${clase?.diaSemana == 'Sábado'}">Sábado</option>
                        <option value="Domingo" th:selected="${clase?.diaSemana == 'Domingo'}">Domingo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <input type="time" name="horario" class="form-control" th:value="${clase?.horario}" required>
                </div>

                <div class="mb-3">
                    <input type="number" name="capacidad" class="form-control" placeholder="Capacidad"
                        th:value="${clase?.capacidad}" min="1" required>
                </div>

                <button type="submit" class="btn btn-main w-100">
                    Guardar Clase
                </button>

            </form>

        </div>

    </div>


    <script src="/js/auth.js"></script>

    <script>

        requireAdmin();

        document.getElementById("formClase").addEventListener("submit", function (e) {
            e.preventDefault();

            const id = document.querySelector("[name=idClase]").value;

            const data = {
                nombre: document.querySelector("[name=nombre]").value,
                descripcion: document.querySelector("[name=descripcion]").value,
                diaSemana: document.querySelector("[name=diaSemana]").value,
                horario: document.querySelector("[name=horario]").value,
                capacidad: parseInt(document.querySelector("[name=capacidad]").value)
            };

            let url = "/clases";
            let method = "POST";

            if (id) {
                url = `/clases/${id}`;
                method = "PUT";
            }


            authFetch(url, {
                method: method,
                body: JSON.stringify(data)
            })
                .then(res => {
                    if (!res.ok) return res.json().then(error => {
                        throw new Error(error.message);
                    });
                    return res.json();
                })
                .then(() => {
                    alert("✅ Clase guardada");
                    window.location.href = "/clasesVista";
                })
                .catch(err => alert(err.message));
        });
    </script>

</body>

</html>
