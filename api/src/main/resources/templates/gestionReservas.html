<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/usuarios.css">
</head>

<body>

    <nav class="navbar header px-4">
        <div class="d-flex align-items-center">
            <img src="/img/logo.png" class="logo me-2">
            <h4 class="titulo m-0">Administración de Reservas</h4>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-danger" onclick="logout()">
                Cerrar sesión
            </button>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="text-center mb-4">
            <h2 class="titulo">Lista de Reservas</h2>
            <p class="subtitulo">Visualiza y elimina reservas del sistema</p>
        </div>

        <div class="mb-4">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar reserva...">
        </div>

        <div class="registro-card p-4">

            <table class="table table-dark table-hover text-center align-middle" id="tablaReservas">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Clase</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${reserva.usuario.nombre}"></td>
                        <td th:text="${reserva.clase.nombre}"></td>
                        <td th:text="${reserva.fechaReserva}"></td>
                        <td th:text="${reserva.estado}"></td>

                        <td>
                            <button class="btn btn-sm btn-danger"
                                th:onclick="'eliminarReserva(' + ${reserva.idReserva} + ')'">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

    <!-- 🔥 auth.js -->
    <script src="/js/auth.js"></script>

    <script>
        // 🔒 SOLO ADMIN
        requireAdmin();

        // 🔥 eliminar reserva usando API
        function eliminarReserva(id) {

            if (!confirm("¿Seguro que deseas eliminar esta reserva?")) return;

            authFetch(`/api/reservas/${id}`, {
                method: "DELETE"
            })
            .then(res => {
                if (!res) return;

                if (!res.ok) throw new Error("Error al eliminar reserva");

                alert("✅ Reserva eliminada");
                location.reload();
            })
            .catch(err => {
                console.error(err);
                alert(err.message);
            });
        }
    </script>

</body>

</html>
