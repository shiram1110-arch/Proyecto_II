<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Clases</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/usuarios.css">
</head>

<body>

    <nav class="navbar header px-4">
        <div class="d-flex align-items-center">
            <img src="/img/logo.png" class="logo me-2">
            <h4 class="titulo m-0">Administración de Clases</h4>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-main" onclick="window.location.href='/crearClase'">
                + Crear Clase
            </button>
            <button class="btn btn-danger" onclick="logout()">
                Cerrar sesión
            </button>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="text-center mb-4">
            <h2 class="titulo">Lista de Clases</h2>
            <p class="subtitulo">Administra las clases del sistema</p>
        </div>

        <div class="mb-4">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar clase...">
        </div>

        <div class="registro-card p-4">

            <table class="table table-dark table-hover text-center align-middle" id="tablaClases">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Día</th>
                        <th>Horario</th>
                        <th>Capacidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="clase : ${clases}">
                        <td th:text="${clase.nombre}"></td>
                        <td th:text="${clase.descripcion}"></td>
                        <td th:text="${clase.diaSemana}"></td>
                        <td th:text="${clase.horario}"></td>
                        <td th:text="${clase.capacidad}"></td>

                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/clases/editar/{id}(id=${clase.idClase})}" class="btn btn-sm btn-primary">
                                    Editar
                                </a>

                                <button class="btn btn-sm btn-danger"
                                    th:onclick="'eliminarClase(' + ${clase.idClase} + ')'">
                                    Eliminar
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

    
    <script src="/js/auth.js"></script>

    <script>
        
        requireAdmin();

    
        function eliminarClase(id) {

            if (!confirm("¿Seguro que deseas eliminar esta clase?")) return;

            authFetch(`/clases/${id}`, {
                method: "DELETE"
            })
            .then(res => {
                if (!res.ok) throw new Error("Error al eliminar");
                alert("✅ Clase eliminada");
                window.location.reload();
            })
            .catch(err => alert(err.message));
        }
    </script>

</body>

</html>
