<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reserva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/reservas.css">
</head>

<body>

    <div class="container-fluid px-5">

        <header class="header d-flex justify-content-between align-items-center py-3">
            <img src="/img/logo.png" class="logo-header">
            <a href="/horarioClases" class="btn btn-secondary">Volver</a>
        </header>

        <div class="card reserva-detalle p-4">

            <h2 class="text-center mb-4 titulo">Reserva tu espacio</h2>

            <div class="row">

                <div class="col-md-5">
                    <img src="/img/reserva.png" class="img-fluid rounded">
                </div>

                <div class="col-md-7">

                    <!-- ❌ sin clase -->
                    <div th:if="${clase == null}">
                        <p>No se encontró la clase</p>
                    </div>

                    <!-- ✅ con clase -->
                    <div th:if="${clase != null}">

                        <h2 th:text="${clase.nombre}"></h2>
                        <p th:text="${clase.descripcion}"></p>
                        <p th:text="${clase.diaSemana}"></p>
                        <p th:text="${clase.horario}"></p>

                        <p th:text="${clase.capacidad + ' cupos disponibles'}"></p>


                        <form id="formReserva">

                            <input type="hidden" name="claseId" th:value="${clase.idClase}">

                            <button type="submit" class="btn btn-main w-100 mt-3" th:disabled="${clase.capacidad == 0}">
                                Reservar
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer class="footer mt-5 py-4 text-center">
        <div class="container">
            <img src="/img/logo.png" width="120" class="mb-2">
            <p>© 2026 VIKINGS</p>
        </div>
    </footer>

    <script>
        document.getElementById("formReserva")?.addEventListener("submit", async function (e) {

            e.preventDefault();

            const token = localStorage.getItem("token");

            if (!token) {
                alert("Debes iniciar sesión");
                window.location.href = "/login";
                return;
            }

            const claseId = document.querySelector("[name=claseId]").value;

            const data = {
                clase: {
                    idClase: parseInt(claseId)
                },
                estado: "Activa"
            };

            try {

                const res = await fetch("/api/reservas", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const error = await res.text();
                    throw new Error(error);
                }

                alert("✅ Reserva realizada");
                window.location.href = "/horarioClases";

            } catch (err) {
                alert("❌ " + err.message);
            }

        });
    </script>

</body>

</html>
