<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/reservas.css">
</head>

<body>

<div class="container-fluid px-5">

    <header class="header">

        <img src="/img/logo.png" alt="Smart Fit" class="logo-header">

        <nav class="menu">
            <a href="#">Prueba</a>
        </nav>

    </header>

    <div class="card reserva-detalle p-4">

        <h2 class="text-center mb-4 titulo">Reserva tu espacio</h2>

        <div class="row">

            <div class="col-md-5">
                <img src="/img/reserva.png" class="img-fluid rounded" alt="Clase">
            </div>

            <div class="col-md-7">

                <div th:if="${clase == null}">
                    <p>No se encontró la clase</p>
                </div>

                <div th:if="${clase != null}">

                    <h2 th:text="${clase.nombre}"></h2>
                    <p th:text="${clase.descripcion}"></p>
                    <p th:text="${clase.diaSemana}"></p>
                    <p th:text="${clase.horario}"></p>

                    <p th:text="${clase.capacidad + ' cupos disponibles'}"></p>

                    <p>
                        <strong>Estado:</strong>
                        <span th:text="${clase.capacidad > 0 ? 'Disponible' : 'Completo'}"
                              th:classappend="${clase.capacidad > 0 ? 'estado disponible' : 'estado lleno'}">
                        </span>
                    </p>

                    <div class="d-flex gap-3 mt-4">

                        <a href="/horarioClases" class="btn btn-volver w-50">Volver</a>

                        <button class="btn btn-main w-50"
                                th:disabled="${clase.capacidad == 0}">
                            Reservar
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="footer mt-5 py-4 text-center">
    <div class="container">
        <img src="/img/logo.png" alt="Logo" width="120" class="mb-2">
        <p>© 2026 VIKINGS</p>
    </div>
</footer>

</body>
</html>
